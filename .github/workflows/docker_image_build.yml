name: docker_image_build

on:
  repository_dispatch:
  workflow_dispatch:
    inputs:
      image:
        description: "Docker image to download (e.g., nginx:latest)"
        required: true
        default: "evalscope:latest"
      cleanup:
        description: "Whether to clean up disk space (true or false)"
        required: true
        default: "false"

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Free Disk Space (Ubuntu)
        if: ${{ inputs.cleanup == 'true' }}
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          # this might remove tools that are actually needed,
          # if set to "true" but frees about 6 GB
          tool-cache: true

          # all of these default to true, but feel free to set to
          # "false" if necessary for your workflow
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: prepare Dockerfile
        run: |
          cat > Dockerfile << 'EOF'
          FROM python:3.10-slim
      
          ENV PYTHONDONTWRITEBYTECODE=1
          ENV PYTHONUNBUFFERED=1
      
          WORKDIR /workspace
      
          RUN apt-get update && apt-get install -y \
              git \
              build-essential \
              && rm -rf /var/lib/apt/lists/*
      
          RUN git clone https://github.com/open-compass/opencompass.git
      
          WORKDIR /workspace/opencompass
      
          RUN pip install --upgrade pip \
              && pip install -e .
      
          CMD ["bash"]
          EOF

      - name: generate filename
        id: filename
        run: |
          SAFE_NAME=$(echo "${{ inputs.image }}" | sed 's/[\/:]/_/g')
          echo "SAFE_NAME=${SAFE_NAME}" >> $GITHUB_ENV

      - name: build Dockerfile
        run: |
          docker build -t ${{ inputs.image }} .

      - name: save image
        run: |
          docker save ${{ inputs.image }} > ${{ runner.temp }}/${{ env.SAFE_NAME }}.tar

      - name: upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.SAFE_NAME }}
          path: ${{ runner.temp }}/${{ env.SAFE_NAME }}.tar
